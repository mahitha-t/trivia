<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parlay All Day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Join/Create Screen -->
    <section id="screen-home" class="screen active">
      <div class="container">
        <h1 class="logo">🎰 Parlay All Day</h1>
        <p class="tagline">Stack your bets. Trust your brain. Get that bag 💰</p>
        <div class="form-group">
          <label for="player-name">Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="16" autocomplete="off" />
        </div>
        <div class="btn-row">
          <button id="btn-create" class="btn btn-primary">Create Room</button>
          <button id="btn-join-toggle" class="btn btn-secondary">Join Room</button>
        </div>
        <div id="join-section" class="hidden">
          <div class="form-group">
            <label for="room-code">Room Code</label>
            <input type="text" id="room-code" placeholder="ABCD" maxlength="4" autocomplete="off" />
          </div>
          <button id="btn-join" class="btn btn-primary">Join</button>
        </div>
        <p id="error-msg" class="error hidden"></p>
      </div>
    </section>

    <!-- Lobby Screen -->
    <section id="screen-lobby" class="screen">
      <div class="container">
        <h2>Room: <span id="lobby-code"></span></h2>
        <p class="subtitle">Share this code with friends</p>
        <div id="lobby-players" class="player-list"></div>
        <button id="btn-start" class="btn btn-primary hidden">Start Game</button>
        <p id="lobby-wait" class="subtitle">Waiting for host to start...</p>
      </div>
    </section>

    <!-- Reveal Screen (category -> answers -> question) -->
    <section id="screen-reveal" class="screen">
      <div class="container">
        <div class="question-header">
          <span id="reveal-progress" class="progress-badge"></span>
          <span id="reveal-pot" class="pot-badge">Pot: $0</span>
        </div>

        <div id="reveal-category-section" class="reveal-section">
          <div class="reveal-label">📂 Category</div>
          <div id="reveal-category-text" class="reveal-content"></div>
        </div>

        <div id="reveal-answers-section" class="reveal-section hidden">
          <div class="reveal-label">🃏 Answer Choices</div>
          <div id="reveal-answers-list" class="reveal-answers"></div>
        </div>

        <div id="reveal-question-section" class="reveal-section hidden">
          <div class="reveal-label">❓ Question</div>
          <div id="reveal-question-text" class="reveal-content question-text"></div>
        </div>

        <div class="poker-actions" id="poker-actions">
          <button id="btn-fold" class="btn btn-danger">Fold 🃏</button>
          <button id="btn-check" class="btn btn-secondary">Check ✓</button>
          <div class="raise-group">
            <button id="btn-raise" class="btn btn-primary">Raise 💰</button>
            <div class="raise-amount-control hidden" id="raise-controls">
              <input type="range" id="raise-slider" min="5" max="50" value="10" step="5" />
              <span id="raise-value">$10</span>
              <button id="btn-confirm-raise" class="btn btn-small btn-primary">Confirm</button>
            </div>
          </div>
        </div>

        <div id="action-status" class="status-text"></div>
        <div id="action-log" class="action-log"></div>
      </div>
    </section>

    <!-- Answering Screen -->
    <section id="screen-answering" class="screen">
      <div class="container">
        <div class="question-header">
          <span id="answer-pot" class="pot-badge">Pot: $0</span>
          <span id="answer-timer" class="timer-badge">20s</span>
        </div>
        <h2 id="question-text" class="question-text"></h2>
        <div id="answer-options" class="answer-grid"></div>
        <div id="answer-status" class="status-text"></div>
      </div>
    </section>

    <!-- Results Screen -->
    <section id="screen-results" class="screen">
      <div class="container">
        <h2 id="results-title">Results</h2>
        <div id="correct-answer-display" class="correct-answer"></div>
        <div id="results-list" class="results-list"></div>
        <button id="btn-next" class="btn btn-primary hidden">Next Round</button>
      </div>
    </section>

    <!-- Game Over Screen -->
    <section id="screen-gameover" class="screen">
      <div class="container">
        <h1 class="winner-title">🏆 Game Over!</h1>
        <div id="final-standings" class="standings-list"></div>
        <button id="btn-play-again" class="btn btn-primary hidden">Play Again</button>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
