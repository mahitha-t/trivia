<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trivia Bet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Join/Create Screen -->
    <section id="screen-home" class="screen active">
      <div class="container">
        <h1 class="logo">🎲 Trivia Bet</h1>
        <p class="tagline">Bet big. Answer right. Win it all.</p>
        <div class="form-group">
          <label for="player-name">Your Name</label>
          <input type="text" id="player-name" placeholder="Enter your name" maxlength="16" autocomplete="off" />
        </div>
        <div class="btn-row">
          <button id="btn-create" class="btn btn-primary">Create Room</button>
          <button id="btn-join-toggle" class="btn btn-secondary">Join Room</button>
        </div>
        <div id="join-section" class="hidden">
          <div class="form-group">
            <label for="room-code">Room Code</label>
            <input type="text" id="room-code" placeholder="ABCD" maxlength="4" autocomplete="off" />
          </div>
          <button id="btn-join" class="btn btn-primary">Join</button>
        </div>
        <p id="error-msg" class="error hidden"></p>
      </div>
    </section>

    <!-- Lobby Screen -->
    <section id="screen-lobby" class="screen">
      <div class="container">
        <h2>Room: <span id="lobby-code"></span></h2>
        <p class="subtitle">Share this code with friends</p>
        <div id="lobby-players" class="player-list"></div>
        <button id="btn-start" class="btn btn-primary hidden">Start Game</button>
        <p id="lobby-wait" class="subtitle">Waiting for host to start...</p>
      </div>
    </section>

    <!-- Betting Screen -->
    <section id="screen-betting" class="screen">
      <div class="container">
        <div class="question-header">
          <span id="bet-progress" class="progress-badge"></span>
          <span id="bet-difficulty" class="difficulty-badge"></span>
        </div>
        <p class="category" id="bet-category"></p>
        <h2>Place Your Bet</h2>
        <p class="balance-display">Your balance: $<span id="bet-balance">100</span></p>
        <div class="bet-controls">
          <div class="bet-presets">
            <button class="btn btn-small bet-preset" data-pct="10">10%</button>
            <button class="btn btn-small bet-preset" data-pct="25">25%</button>
            <button class="btn btn-small bet-preset" data-pct="50">50%</button>
            <button class="btn btn-small bet-preset" data-pct="100">ALL IN</button>
          </div>
          <div class="form-group">
            <input type="range" id="bet-slider" min="0" max="100" value="10" />
            <div class="bet-amount">$<span id="bet-value">10</span></div>
          </div>
          <button id="btn-place-bet" class="btn btn-primary">Lock In Bet</button>
        </div>
        <div id="bet-status" class="status-text"></div>
      </div>
    </section>

    <!-- Answering Screen -->
    <section id="screen-answering" class="screen">
      <div class="container">
        <div class="question-header">
          <span id="answer-progress" class="progress-badge"></span>
          <span id="answer-difficulty" class="difficulty-badge"></span>
        </div>
        <h2 id="question-text" class="question-text"></h2>
        <div id="answer-options" class="answer-grid"></div>
        <div id="answer-status" class="status-text"></div>
      </div>
    </section>

    <!-- Results Screen -->
    <section id="screen-results" class="screen">
      <div class="container">
        <h2>Results</h2>
        <div id="correct-answer-display" class="correct-answer"></div>
        <div id="results-list" class="results-list"></div>
        <button id="btn-next" class="btn btn-primary hidden">Next Question</button>
      </div>
    </section>

    <!-- Game Over Screen -->
    <section id="screen-gameover" class="screen">
      <div class="container">
        <h1 class="winner-title">🏆 Game Over!</h1>
        <div id="final-standings" class="standings-list"></div>
        <button id="btn-play-again" class="btn btn-primary hidden">Play Again</button>
      </div>
    </section>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
